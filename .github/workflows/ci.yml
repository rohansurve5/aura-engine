name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      # Two content gates run here: the corpus-level diversity gate and the
      # per-day distinctness gate (no two areas may explain themselves the same
      # way on the same date). See docs/CONTENT_KEYS.md § Two gates.
      - name: Tests (incl. corpus + per-day content gates)
        run: uv run pytest -q
