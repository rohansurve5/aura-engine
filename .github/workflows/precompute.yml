name: nightly-precompute

# 01:00 IST == 19:30 UTC the previous day (IST = UTC+05:30, no DST).
on:
  schedule:
    - cron: "30 19 * * *"
  workflow_dispatch: {}

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      # The content diversity gate + determinism tests must pass before this
      # job is allowed to seed rules or write guidance rows.
      - name: Tests (gate the seed)
        run: uv run pytest -q

      - name: Apply migrations + seed rules
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: uv run python db/migrate.py

      - name: Precompute 14-day sky + guidance
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: uv run python -m engine.jobs.precompute
